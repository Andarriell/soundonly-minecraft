# SoundOnly - Configuration

websocket:
  address: "0.0.0.0"
  port: 8765

# URLs du panel (fallback si le panel n'est pas connecte au demarrage)
# Ces valeurs sont ecrasees dynamiquement quand le panel se connecte
panel:
  # URL publique de la page d'ecoute (listener.html)
  listener-url: "http://TON-IP:3000/listener.html"
  # URL du panel admin
  admin-url: "http://TON-IP:3000"

worldguard:
  enabled: false
  regions:
    - main_stage
    - esprit
    - vegetal
    - futuriste
  allow-if-missing: true
  bypass-permission: "soundonly.worldguard.bypass"
  debug: false
